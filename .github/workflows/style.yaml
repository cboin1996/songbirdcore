name: Lint

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: psf/black@stable
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Install requirements
        run: make setup
